<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>任天堂ソフト診断</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .logo { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 26px; font-weight: 900; color: #1a1a1a; line-height: 1.4; margin-bottom: 14px; }
    h1 span { color: #e60012; }
    p { font-size: 14px; color: #888; line-height: 1.8; margin-bottom: 40px; }
    .questions-count { margin-top: 24px; font-size: 12px; color: #bbb; }

    @media (max-width: 480px) {
      .logo { font-size: 48px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🎮</div>
    <h1>あなたにぴったりの<br><span>任天堂ソフト</span>を見つけよう</h1>
    <p>質問に答えるだけで、<br>Nintendo Switch / Switch 2 / クラシックから<br>あなたにおすすめのソフトを提案します</p>
    <a href="/quiz" class="btn">診断スタート！</a>
    <!-- <p class="questions-count">数問・約1分</p> -->
  </div>
</body>
</html>
