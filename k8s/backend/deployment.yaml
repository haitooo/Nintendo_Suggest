apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: nintendo-suggest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: nintendo-suggest-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: db
            - name: DB_PORT
              value: "3306"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_NAME
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "800m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /api/questions
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
